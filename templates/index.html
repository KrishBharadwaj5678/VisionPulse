<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>🧿 Vision Pulse</title>
    <style>
      .filter-select {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        padding: 10px 14px;
        font-size: 14px;
        border: 1px solid #ddd;
        background-color: #fff;
        color: #333;
        cursor: pointer;
        outline: none;
        transition: all 0.2s ease;
      }

      .filter-select:hover {
        border-color: #888;
      }

      .filter-select:focus {
        border-color: #4CAF50;
        box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
      }

      .select-wrapper {
        position: relative;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div style="display:flex; justify-content:center; align-items:center; height:100vh; background:#020617;">
      <div style="width:90%; max-width:900px; border-radius:12px; overflow:hidden;  border:2px solid #1e293b;">
        <div class="select-wrapper">
          <select id="objectFilter" class="filter-select" onchange="setFilter(this.value)">
            <option value="all">All Objects</option>
            <option value="person">Person</option>
            <option value="bottle">Bottle</option>
            <option value="cup">Cup</option>
            <option value="knife">Knife</option>
          </select>
        </div>
         <!-- /video -->
        <img
          src="{{ url_for('video') }}"
          style="width:100%; height:auto; display:block;"
          alt="Vision Pulse"
        >
      </div>
    </div>

  <script>
    let setFilter = (value) => {
      fetch(`/set_filter?object=${value}`);
    }
  </script>
  </body>
</html>
